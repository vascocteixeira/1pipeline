name: Playwright Tests Diarios

on:
  schedule:
    - cron: '0 0 * * *' # Corre todos os dias à meia-noite
  workflow_dispatch:     # Permite correr manualmente agora

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Instalar dependencias
      run: npm install

    - name: Instalar Browsers do Playwright
      run: npx playwright install --with-deps

    - name: Correr Testes Playwright
      run: npx playwright test

    - name: Guardar Relatorio
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

